# alert-summarizer シークレット
# デプロイ前に実際の値を設定すること:
#   kubectl create secret generic alert-summarizer-secret \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#     --from-literal=GRAFANA_PASSWORD="changeme" \
#     --from-literal=SLACK_WEBHOOK_URL="" \
#     -n aiops
#
# このファイルはテンプレートとして参照用。Git にシークレット値をコミットしないこと。
apiVersion: v1
kind: Secret
metadata:
  name: alert-summarizer-secret
  namespace: aiops
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""       # Claude API キー (必須) — https://console.anthropic.com/
  GRAFANA_PASSWORD: "changeme" # Grafana admin パスワード
  SLACK_WEBHOOK_URL: ""       # Slack Incoming Webhook URL (オプション)
