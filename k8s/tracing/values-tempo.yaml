# Grafana Tempo Helm values
# ラボ向けシングルバイナリ構成

tempo:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  retention: 24h

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces

persistence:
  enabled: true
  size: 10Gi
  storageClassName: longhorn
