# MinIO Helm values
# Helm chart: minio/minio (公式チャート)
# S3 互換オブジェクトストレージ。Velero バックアップ先として使用。

# -------------------------------------------------------------------
# 認証情報
# -------------------------------------------------------------------
rootUser: admin
rootPassword: "Minio12345"

# -------------------------------------------------------------------
# 動作モード
# -------------------------------------------------------------------
mode: standalone
replicas: 1

# -------------------------------------------------------------------
# デフォルトバケット (起動時に自動作成)
# -------------------------------------------------------------------
buckets:
  - name: velero-backups
    policy: none
    purge: false

# -------------------------------------------------------------------
# Ingress (API エンドポイント)
# -------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - minio-api.homelab.local

# -------------------------------------------------------------------
# Ingress (コンソール UI)
# -------------------------------------------------------------------
consoleIngress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - minio.homelab.local

# -------------------------------------------------------------------
# 永続化 (Longhorn)
# -------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: longhorn
  size: 20Gi

# -------------------------------------------------------------------
# リソース制限
# -------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
