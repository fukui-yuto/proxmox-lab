# MinIO Helm values
# Helm chart: bitnami/minio
# S3 互換オブジェクトストレージ。Velero バックアップ先として使用。

# -------------------------------------------------------------------
# 認証情報
# -------------------------------------------------------------------
auth:
  rootUser: admin
  rootPassword: "Minio12345"

# -------------------------------------------------------------------
# 動作モード (スタンドアロン)
# -------------------------------------------------------------------
mode: standalone

# -------------------------------------------------------------------
# デフォルトバケット (起動時に自動作成)
# -------------------------------------------------------------------
defaultBuckets: "velero-backups"

# -------------------------------------------------------------------
# Ingress (コンソール UI)
# -------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: traefik
  hostname: minio.homelab.local
  annotations: {}

apiIngress:
  enabled: true
  ingressClassName: traefik
  hostname: minio-api.homelab.local
  annotations: {}

# -------------------------------------------------------------------
# 永続化 (Longhorn)
# -------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: longhorn
  size: 20Gi
  accessModes:
    - ReadWriteOnce

# -------------------------------------------------------------------
# リソース制限
# -------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -------------------------------------------------------------------
# サービス設定
# -------------------------------------------------------------------
service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001
