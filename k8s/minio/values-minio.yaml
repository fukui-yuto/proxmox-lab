# MinIO Helm values
# Helm chart: minio/minio (公式チャート)
# S3 互換オブジェクトストレージ。Velero バックアップ先として使用。

# -------------------------------------------------------------------
# 認証情報
# -------------------------------------------------------------------
rootUser: admin
rootPassword: "Minio12345"

# -------------------------------------------------------------------
# 動作モード
# -------------------------------------------------------------------
mode: standalone
replicas: 1

# -------------------------------------------------------------------
# デフォルトバケット (起動時に自動作成)
# -------------------------------------------------------------------
buckets:
  - name: velero-backups
    policy: none
    purge: false

# -------------------------------------------------------------------
# Ingress (API エンドポイント)
# -------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - minio-api.homelab.local

# -------------------------------------------------------------------
# Ingress (コンソール UI)
# -------------------------------------------------------------------
consoleIngress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - minio.homelab.local

# -------------------------------------------------------------------
# 永続化 (Longhorn)
# -------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: longhorn
  size: 20Gi

# -------------------------------------------------------------------
# OIDC 認証 (Keycloak SSO)
# -------------------------------------------------------------------
# Root 認証 (admin/Minio12345) は引き続き有効。
# OIDC ユーザーには consoleAdmin ポリシーが Keycloak の hardcoded claim で付与される。
environment:
  MINIO_IDENTITY_OPENID_CONFIG_URL: "http://keycloak.homelab.local/realms/homelab/.well-known/openid-configuration"
  MINIO_IDENTITY_OPENID_CLIENT_ID: "minio"
  MINIO_IDENTITY_OPENID_CLIENT_SECRET: "minio-keycloak-secret-2026"
  MINIO_IDENTITY_OPENID_DISPLAY_NAME: "Keycloak"
  MINIO_IDENTITY_OPENID_SCOPES: "openid,profile,email,groups"
  MINIO_IDENTITY_OPENID_CLAIM_NAME: "policy"
  MINIO_IDENTITY_OPENID_REDIRECT_URI: "http://minio.homelab.local/oauth_callback"

# -------------------------------------------------------------------
# リソース制限
# -------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
