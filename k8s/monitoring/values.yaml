# kube-prometheus-stack Helm values
# ラボ向けに軽量化した設定

# -------------------------------------------------------------------
# Prometheus
# -------------------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 400Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# -------------------------------------------------------------------
# Grafana
# -------------------------------------------------------------------
grafana:
  adminPassword: "changeme"   # 初回ログイン後に必ず変更すること

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  persistence:
    enabled: true
    size: 2Gi

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.homelab.local
    paths:
      - /

  # Elasticsearch をデータソースとして追加 (Phase 2 で有効化)
  # additionalDataSources:
  #   - name: Elasticsearch
  #     type: elasticsearch
  #     url: http://elasticsearch.elasticsearch.svc.cluster.local:9200
  #     jsonData:
  #       index: "fluent-bit-*"
  #       timeField: "@timestamp"
  #       logMessageField: log
  #       logLevelField: level

# -------------------------------------------------------------------
# Alertmanager
# -------------------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
    receivers:
      - name: "null"
    # Slack 通知を使う場合は以下のコメントを外す
    # receivers:
    #   - name: slack
    #     slack_configs:
    #       - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    #         channel: "#alerts"
    #         send_resolved: true

# -------------------------------------------------------------------
# node_exporter (各 k3s ノードのメトリクス収集)
# -------------------------------------------------------------------
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -------------------------------------------------------------------
# kube-state-metrics (Kubernetes リソースのメトリクス収集)
# -------------------------------------------------------------------
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# 不要なコンポーネントを無効化
# -------------------------------------------------------------------
kubeEtcd:
  enabled: false   # k3s は etcd ではなく SQLite / embedded etcd を使用

kubeControllerManager:
  enabled: false   # k3s では直接アクセス不可

kubeScheduler:
  enabled: false   # k3s では直接アクセス不可

kubeProxy:
  enabled: false   # k3s では kube-proxy が存在しない
