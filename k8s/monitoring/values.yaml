# kube-prometheus-stack Helm values
# ラボ向けに軽量化した設定

# -------------------------------------------------------------------
# Prometheus
# -------------------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi  # WAL replay 時の OOM kill 対策
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# -------------------------------------------------------------------
# Grafana
# -------------------------------------------------------------------
grafana:
  adminPassword: "changeme"   # 初回ログイン後に必ず変更すること

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  persistence:
    enabled: true
    size: 2Gi

  grafana.ini:
    server:
      domain: grafana.homelab.local
      root_url: "http://grafana.homelab.local"

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.homelab.local
    paths:
      - /

  # Elasticsearch データソース (Phase 2-1)
  # Tempo データソース (Phase 2-2)
  additionalDataSources:
    - name: Elasticsearch
      type: elasticsearch
      url: http://elasticsearch-master.logging.svc.cluster.local:9200
      jsonData:
        index: "fluent-bit-*"
        timeField: "@timestamp"
        logMessageField: log
        logLevelField: level
        esVersion: "8.0.0"
        maxConcurrentShardRequests: 5
    - name: Tempo
      type: tempo
      url: http://tempo.tracing.svc.cluster.local:3100
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus

# -------------------------------------------------------------------
# Alertmanager
# -------------------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["namespace", "alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "null"
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        # 自動修復トリガー: remediation ラベルで Argo Events に先に送信
        - matchers:
            - remediation = "oom"
          receiver: "argo-events-oom"
          continue: true   # alert-summarizer にも転送
        - matchers:
            - remediation = "crashloop"
          receiver: "argo-events-crashloop"
          continue: true   # alert-summarizer にも転送
        - matchers:
            - severity = "critical"
          receiver: "alert-summarizer"
          continue: false
        - matchers:
            - severity = "warning"
          receiver: "alert-summarizer"
          continue: false
    inhibit_rules:
      # ノードダウン時はそのノード上の Pod/コンテナアラートを抑制
      - source_matchers:
          - alertname = "NodeNotReady"
        target_matchers:
          - alertname =~ "Pod.*|Container.*|Kube.*"
        equal: ["node"]
      # Critical 発火中は同一 instance の Warning を抑制
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["alertname", "namespace", "instance"]
    receivers:
      - name: "null"
      - name: "alert-summarizer"
        webhook_configs:
          - url: "http://alert-summarizer.aiops.svc.cluster.local:8080/webhook"
            send_resolved: false
      - name: "argo-events-oom"
        webhook_configs:
          - url: "http://alertmanager-eventsource-svc.argo-events.svc.cluster.local:12000/oomkilled"
            send_resolved: false
      - name: "argo-events-crashloop"
        webhook_configs:
          - url: "http://alertmanager-eventsource-svc.argo-events.svc.cluster.local:12000/crashloop"
            send_resolved: false

# -------------------------------------------------------------------
# node_exporter (各 k3s ノードのメトリクス収集)
# -------------------------------------------------------------------
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -------------------------------------------------------------------
# kube-state-metrics (Kubernetes リソースのメトリクス収集)
# -------------------------------------------------------------------
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# 不要なコンポーネントを無効化
# -------------------------------------------------------------------
kubeEtcd:
  enabled: false   # k3s は etcd ではなく SQLite / embedded etcd を使用

kubeControllerManager:
  enabled: false   # k3s では直接アクセス不可

kubeScheduler:
  enabled: false   # k3s では直接アクセス不可

kubeProxy:
  enabled: false   # k3s では kube-proxy が存在しない
