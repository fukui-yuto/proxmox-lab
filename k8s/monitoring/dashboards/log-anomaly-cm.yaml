apiVersion: v1
kind: ConfigMap
metadata:
  name: log-anomaly-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  log-anomaly.json: |
    {
      "title": "Log Anomaly Detection",
      "uid": "log-anomaly",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-3h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Total Log Anomaly",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "targets": [
            { "expr": "log_anomaly_total_detected{job=\"log-anomaly-detector\"}", "legendFormat": "", "refId": "A" }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "text": {},
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "正常", "color": "green" }, "1": { "text": "異常", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Log Anomaly",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "targets": [
            { "expr": "log_anomaly_error_detected{job=\"log-anomaly-detector\"}", "legendFormat": "", "refId": "A" }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "text": {},
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "正常", "color": "green" }, "1": { "text": "異常", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            }
          }
        },
        {
          "id": 3,
          "title": "Error Log Level-Shift",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "targets": [
            { "expr": "log_anomaly_error_shift_detected{job=\"log-anomaly-detector\"}", "legendFormat": "", "refId": "A" }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "text": {},
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "正常", "color": "green" }, "1": { "text": "急増", "color": "orange" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }] }
            }
          }
        },
        {
          "id": 4,
          "title": "Error Rate",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "targets": [
            { "expr": "log_error_rate{job=\"log-anomaly-detector\"}", "legendFormat": "", "refId": "A" }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "text": {},
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.1 }, { "color": "red", "value": 0.3 }] }
            }
          }
        },
        {
          "id": 5,
          "title": "Log Count (Total vs Error)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            { "expr": "log_total_count{job=\"log-anomaly-detector\"}", "legendFormat": "Total", "refId": "A" },
            { "expr": "log_error_count{job=\"log-anomaly-detector\"}", "legendFormat": "Error", "refId": "B" }
          ],
          "options": {
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Error" }, "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }] }
            ]
          }
        },
        {
          "id": 6,
          "title": "Error Rate Trend",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
            { "expr": "log_error_rate{job=\"log-anomaly-detector\"}", "legendFormat": "Error Rate", "refId": "A" }
          ],
          "options": {
            "tooltip": { "mode": "single" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.1 }, { "color": "red", "value": 0.3 }] },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 7,
          "title": "Anomaly Flags Timeline",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 6 },
          "targets": [
            { "expr": "log_anomaly_total_detected{job=\"log-anomaly-detector\"}", "legendFormat": "Total Volume Anomaly", "refId": "A" },
            { "expr": "log_anomaly_error_detected{job=\"log-anomaly-detector\"}", "legendFormat": "Error Volume Anomaly", "refId": "B" },
            { "expr": "log_anomaly_error_shift_detected{job=\"log-anomaly-detector\"}", "legendFormat": "Error Level-Shift", "refId": "C" }
          ],
          "options": {
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "min": 0, "max": 1 }
          }
        },
        {
          "id": 8,
          "title": "Namespace 別エラー件数 (直近 6h)",
          "description": "エラーが多い namespace を特定する。異常検知フラグが立ったときにここを確認する。",
          "type": "barchart",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sort_desc(log_error_count_by_namespace{job=\"log-anomaly-detector\"})",
              "legendFormat": "{{namespace}}",
              "refId": "A",
              "instant": true
            }
          ],
          "options": {
            "orientation": "horizontal",
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" },
            "xTickLabelRotation": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 9,
          "title": "Top エラー Pod (直近 6h)",
          "description": "エラーログが最も多い Pod の一覧。CrashLoop・設定ミスの疑いがある Pod を特定する。",
          "type": "table",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sort_desc(log_error_count_by_pod{job=\"log-anomaly-detector\"})",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {
            "sortBy": [{ "displayName": "Value", "desc": true }]
          },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "namespace" },
                "properties": [{ "id": "displayName", "value": "Namespace" }, { "id": "custom.width", "value": 150 }]
              },
              {
                "matcher": { "id": "byName", "options": "pod" },
                "properties": [{ "id": "displayName", "value": "Pod" }, { "id": "custom.width", "value": 300 }]
              },
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "エラー件数" },
                  { "id": "custom.width", "value": 100 },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 10 }, { "color": "red", "value": 100 }] } },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "labelsToFields", "options": { "valueLabel": "pod" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "job": true, "__name__": true } } }
          ]
        },
        {
          "id": 10,
          "title": "Namespace 別エラー率トレンド",
          "description": "namespace ごとのエラー件数の時系列推移。どの namespace でいつエラーが増えたかを確認する。",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 26, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "log_error_count_by_namespace{job=\"log-anomaly-detector\"}",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            }
          }
        }
      ]
    }
