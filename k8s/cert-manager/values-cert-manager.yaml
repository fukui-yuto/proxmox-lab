# cert-manager Helm values
# Helm chart: jetstack/cert-manager
# TLS 証明書の自動発行・更新。homelab 内部 CA を使用。

# CRD を Helm で管理する (v1.14.x では installCRDs を使用)
installCRDs: true

# -------------------------------------------------------------------
# リソース制限
# -------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

webhook:
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

cainjector:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
