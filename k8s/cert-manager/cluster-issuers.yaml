# cert-manager ClusterIssuer 定義
# homelab 内部 CA チェーン:
#   1. selfsigned-issuer     → ブートストラップ用の自己署名 Issuer
#   2. homelab-root-ca       → selfsigned-issuer が発行するルート CA 証明書
#   3. homelab-ca-issuer     → homelab-root-ca を使う CA ClusterIssuer
#
# 各 Ingress に以下アノテーションを付けると証明書が自動発行される:
#   cert-manager.io/cluster-issuer: homelab-ca-issuer
---
# 1. ブートストラップ用自己署名 Issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# 2. ルート CA 証明書 (10年有効)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: homelab-root-ca
  secretName: homelab-root-ca-secret
  duration: 87600h   # 10 years
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
# 3. homelab 内部 CA ClusterIssuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-ca-issuer
spec:
  ca:
    secretName: homelab-root-ca-secret
