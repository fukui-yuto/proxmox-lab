apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana
  namespace: logging
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: logging-kibana-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: kibana.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth2-proxy
  namespace: logging
spec:
  ingressClassName: traefik
  rules:
    - host: kibana.homelab.local
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
