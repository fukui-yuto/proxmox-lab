# Elasticsearch Helm values
# ラボ向けシングルノード構成

replicas: 1
minimumMasterNodes: 1

# セキュリティ・TLS 無効 (ラボ環境)
# Elasticsearch 8.x はデフォルトで TLS が有効なため明示的に無効化する
protocol: http
createCert: false

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.security.enrollment.enabled: false
    xpack.security.http.ssl.enabled: false
    xpack.security.transport.ssl.enabled: false

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 1.5Gi

# JVM ヒープサイズ (メモリ limit の 50% を目安)
esJavaOpts: "-Xmx512m -Xms512m"

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi

persistence:
  enabled: true

service:
  type: ClusterIP
  port: 9200

# シングルノード構成では yellow が正常状態。
# readiness probe の bash スクリプトは wait_for_status=green がハードコードされているが、
# START_FILE (/tmp/.es_start_file) が存在すると "/ が 200 を返すか" チェックに切り替わる。
# lifecycle.postStart で START_FILE を即座に作成することで green チェックをスキップする。
lifecycle:
  postStart:
    exec:
      command:
        - bash
        - -c
        - "touch /tmp/.es_start_file"
