# Elasticsearch Helm values
# ラボ向けシングルノード構成

replicas: 1
minimumMasterNodes: 1

# セキュリティ・TLS 無効 (ラボ環境)
# Elasticsearch 8.x はデフォルトで TLS が有効なため明示的に無効化する
protocol: http
createCert: false

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.security.enrollment.enabled: false
    xpack.security.http.ssl.enabled: false
    xpack.security.transport.ssl.enabled: false
    # NOTE: discovery.type: single-node はここに設定できない。
    # Helm chart が StatefulSet の env var で cluster.initial_master_nodes を自動設定するため、
    # discovery.type: single-node と共存できず ES が起動不能になる (IllegalArgumentException)。
    # 代わりに detect.py 側で総ログ量の急減を無視する (high_only=True) ことで誤検知を防ぐ。

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1.5Gi

# JVM ヒープサイズ (メモリ limit の 50% を目安)
esJavaOpts: "-Xmx512m -Xms512m"

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi

persistence:
  enabled: true

service:
  type: ClusterIP
  port: 9200

# master ノードでの起動を禁止 (メモリ 6GB の master に ES を載せると API server が不安定になる)
antiAffinity: "soft"
nodeAffinity:
  requiredDuringSchedulingIgnoredDuringExecution:
    nodeSelectorTerms:
      - matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: DoesNotExist

# シングルノード構成では yellow が正常状態。
# readiness probe の bash スクリプトは wait_for_status=green がハードコードされているが、
# START_FILE (/tmp/.es_start_file) が存在すると "/ が 200 を返すか" チェックに切り替わる。
# lifecycle.postStart で START_FILE を即座に作成することで green チェックをスキップする。
lifecycle:
  postStart:
    exec:
      command:
        - bash
        - -c
        - "touch /tmp/.es_start_file"
