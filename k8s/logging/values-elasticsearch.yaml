# Elasticsearch Helm values
# ラボ向けシングルノード構成

replicas: 1
minimumMasterNodes: 1

# セキュリティ無効 (ラボ環境)
esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.security.enrollment.enabled: false

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 1.5Gi

# JVM ヒープサイズ (メモリ limit の 50% を目安)
esJavaOpts: "-Xmx512m -Xms512m"

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi

persistence:
  enabled: true

service:
  type: ClusterIP
  port: 9200
