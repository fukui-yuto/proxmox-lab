apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: logging
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=keycloak-oidc
            - --client-id=kibana
            - --client-secret=kibana-keycloak-secret-2026
            - --oidc-issuer-url=http://keycloak.homelab.local/realms/homelab
            - --cookie-secret=aG9tZWxhYi1raWJhbmEtb2F1dGgyLXNlY3JldGtleXM=
            - --cookie-secure=false
            - --http-address=0.0.0.0:4180
            - --upstream=http://kibana:5601
            - --email-domain=*
            - --scope=openid profile email groups
            - --redirect-url=http://kibana.homelab.local/oauth2/callback
            - --skip-provider-button=true
            - --code-challenge-method=S256
          ports:
            - containerPort: 4180
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: logging
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
      name: http
