# Kibana Helm values
# ラボ向け軽量設定

elasticsearchHosts: "http://elasticsearch-master:9200"

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# ヘルスチェックの猶予時間を延長 (起動が遅い場合の対策)
readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 10
