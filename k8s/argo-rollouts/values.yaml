## Argo Rollouts Helm values
## Chart: argoproj/argo-rollouts

installCRDs: true

controller:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

dashboard:
  enabled: true
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argo-rollouts.homelab.local
    paths:
      - /
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
