## Cilium Helm values
## Chart: cilium/cilium
##
## 注意: k3s はデフォルトで flannel を使用するため、
## Cilium を CNI として利用するには事前に flannel を無効化した上で
## k3s を再起動する必要がある。README.md の移行手順を参照。

# k3s との統合
k8sServiceHost: "192.168.210.21"  # k3s-master IP
k8sServicePort: "6443"

# kube-proxy replacement は無効���し、k3s 内蔵 kube-proxy (iptables) に委譲する。
# 理由: kubeProxyReplacement: true + tunnel (VXLAN) モードでは、ClusterIP の DNAT を
# socketLB (cgroup BPF) が処���する必要があるが、k3s の containerd 環境では
# Cilium コンテナの cgroup namespace がホストと分���されており、socketLB の
# BPF プログラムが Pod の cgroup にアタッチできない。
# その結果、全 ClusterIP が non-routable となり DNS 含むサービス間通信が全断する。
# k3s は --disable-kube-proxy なしで起動されているため、内蔵 kube-proxy の
# iptables ルールが有効。Cilium は CNI (VXLAN/ネットワーキ���グ) のみを���当する。
kubeProxyReplacement: false

# IPAM: kubernetes モードで k8s node.spec.podCIDR をそのまま使用する。
# cluster-pool モードでは cilium が独自の CIDR をノードに割り当てるため、
# 旧 flannel 時代の k8s podCIDR (cni0 ブリッジ) と不一致になり
# ローカル Pod へのルートが VXLAN 経由になってヘルスプローブが失敗する。
ipam:
  mode: "kubernetes"

# Hubble (可観測性)
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: traefik
      hosts:
        - hubble.homelab.local
      paths:
        - /
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
    serviceMonitor:
      enabled: true

# Prometheus メトリクス
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    # kube-prometheus-stack の CRD が存在することをチャートに伝える
    trustCRDsExist: true

operator:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      trustCRDsExist: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# L7 ポリシー (HTTP/gRPC レベルの制御)
l7Proxy: true

# BPF マスカレード
bpf:
  masquerade: false

# ノード間通信: tunnel モードと autoDirectNodeRoutes は共存不可のため tunnel のみ使用
# autoDirectNodeRoutes: true  # native routing モード時のみ有効
