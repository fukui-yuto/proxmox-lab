# Velero Helm values
# Helm chart: vmware-tanzu/velero
# k8s リソースと PVC のバックアップ・DR。MinIO を S3 バックエンドとして使用。

# -------------------------------------------------------------------
# CRD 管理: ArgoCD (ServerSideApply) に任せるため無効化
# -------------------------------------------------------------------
upgradeCRDs: false

# -------------------------------------------------------------------
# AWS (S3/MinIO 互換) プラグイン
# -------------------------------------------------------------------
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.9.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# -------------------------------------------------------------------
# MinIO 接続設定
# -------------------------------------------------------------------
configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      default: true
      config:
        region: minio
        s3ForcePathStyle: "true"
        s3Url: http://minio.minio.svc.cluster.local:9000
        publicUrl: http://minio-api.homelab.local

  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: minio

# -------------------------------------------------------------------
# MinIO 認証情報
# -------------------------------------------------------------------
credentials:
  useSecret: true
  secretContents:
    cloud: |
      [default]
      aws_access_key_id = admin
      aws_secret_access_key = Minio12345

# -------------------------------------------------------------------
# バックアップスケジュール (毎日 02:00 JST = 17:00 UTC)
# -------------------------------------------------------------------
schedules:
  daily-backup:
    disabled: false
    schedule: "0 17 * * *"
    template:
      ttl: "168h"    # 7日間保持
      includedNamespaces:
        - "*"
      excludedNamespaces:
        - kube-system
        - kube-public
        - kube-node-lease
      storageLocation: default
      volumeSnapshotLocations:
        - default

# -------------------------------------------------------------------
# リソース制限
# -------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -------------------------------------------------------------------
# Longhorn ボリュームの FSB (File System Backup) を有効化
# -------------------------------------------------------------------
defaultVolumesToFsBackup: true

# -------------------------------------------------------------------
# Metrics (Prometheus Operator 対応)
# -------------------------------------------------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: monitoring
