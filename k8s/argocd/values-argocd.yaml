# ArgoCD Helm values
# ラボ向けに軽量化した設定
# Helm chart: argo/argo-cd, version: 7.3.4

# -------------------------------------------------------------------
# グローバル設定
# -------------------------------------------------------------------
global:
  # ラボ環境のため TLS は無効化
  domain: argocd.homelab.local

# -------------------------------------------------------------------
# 管理者パスワード固定 (Argocd12345)
# -------------------------------------------------------------------
configs:
  secret:
    argocdServerAdminPassword: "$2a$10$1n/U6oGHF0IbhbQZoBeQtu1IwUB7QYgfMV7p/jmHHgznOWi0d3xP6"

# -------------------------------------------------------------------
# ArgoCD サーバー
# -------------------------------------------------------------------
server:
  # TLS を無効化して HTTP で動作させる (Traefik が TLS 終端を担う)
  extraArgs:
    - --insecure

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.homelab.local
    # insecure モードのため TLS 設定は不要
    tls: false
    # chart が port 443 の ingress を生成するため、デプロイ後に以下で手動 patch が必要:
    # kubectl patch ingress argocd-server -n argocd --type=json \
    #   -p='[{"op":"replace","path":"/spec/rules/0/http/paths/0/backend/service/port/number","value":80}]'

# -------------------------------------------------------------------
# ApplicationSet コントローラー
# -------------------------------------------------------------------
applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Notifications コントローラー
# -------------------------------------------------------------------
notifications:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Redis (ArgoCD 内蔵)
# -------------------------------------------------------------------
redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Repo サーバー
# -------------------------------------------------------------------
repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 5

# -------------------------------------------------------------------
# Application コントローラー
# -------------------------------------------------------------------
controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
