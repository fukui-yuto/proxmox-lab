# ArgoCD Helm values
# ラボ向けに軽量化した設定
# Helm chart: argo/argo-cd, version: 9.4.17 (ArgoCD v3.3.6)

# -------------------------------------------------------------------
# グローバル設定
# -------------------------------------------------------------------
global:
  # ラボ環境のため TLS は無効化
  domain: argocd.homelab.local

# -------------------------------------------------------------------
# 管理者パスワード固定 (Argocd12345)
# -------------------------------------------------------------------
configs:
  secret:
    argocdServerAdminPassword: "$2a$10$1n/U6oGHF0IbhbQZoBeQtu1IwUB7QYgfMV7p/jmHHgznOWi0d3xP6"

  cm:
    # Keycloak OIDC SSO
    oidc.config: |
      name: Keycloak
      issuer: http://keycloak.homelab.local/realms/homelab
      clientID: argocd
      clientSecret: argocd-keycloak-secret-2026
      requestedScopes:
        - openid
        - profile
        - email
        - groups
      requestedIDTokenClaims:
        groups:
          essential: true

  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, homelab-admins, role:admin

# -------------------------------------------------------------------
# ArgoCD サーバー
# -------------------------------------------------------------------
server:
  # TLS を無効化して HTTP で動作させる (Traefik が TLS 終端を担う)
  extraArgs:
    - --insecure

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.homelab.local
    # insecure モードのため TLS 設定は不要
    tls: false
    # 注意: chart 9.4.17 は tls: false でも ingress backend を port 443 で生成する。
    # install.sh の "Ingress port patch" ステップで port 80 に自動修正済み。
    # helm upgrade 後は必ず install.sh のパッチを再適用すること。

# -------------------------------------------------------------------
# ApplicationSet コントローラー
# -------------------------------------------------------------------
applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Notifications コントローラー
# -------------------------------------------------------------------
notifications:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Redis (ArgoCD 内蔵)
# -------------------------------------------------------------------
redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Repo サーバー
# -------------------------------------------------------------------
repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  livenessProbe:
    httpGet:
      path: /healthz
      port: metrics
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 5

# -------------------------------------------------------------------
# Application コントローラー
# -------------------------------------------------------------------
controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 2Gi
