apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  sources:
    - repoURL: https://vmware-tanzu.github.io/helm-charts
      chart: velero
      targetRevision: "7.1.4"
      helm:
        valueFiles:
          - $values/k8s/velero/values-velero.yaml
    - repoURL: https://github.com/fukui-yuto/proxmox-lab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  # upgradeCRDs=false にしても Helm が ClusterRole/ClusterRoleBinding/ServiceAccount を
  # upgrade-crds 用に残す場合がある。prune: true で自動削除されるが、
  # 削除タイミングのズレで diff が出ることがあるため ignoreDifferences で除外する。
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: velero-upgrade-crds
      jsonPointers:
        - /rules
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: velero-upgrade-crds
      jsonPointers:
        - /subjects
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
