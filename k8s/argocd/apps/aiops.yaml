---
# alerting: PrometheusRule (予測・トレンドアラート)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-alerting
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: default
  source:
    repoURL: https://github.com/fukui-yuto/proxmox-lab
    targetRevision: HEAD
    path: k8s/aiops/alerting
    directory:
      include: "prometheusrule.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
---
# pushgateway: Prometheus Pushgateway (異常検知メトリクスの受け口)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-pushgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-pushgateway
      targetRevision: "2.14.0"
      helm:
        valueFiles:
          - $values/k8s/aiops/anomaly-detection/pushgateway/values.yaml
    - repoURL: https://github.com/fukui-yuto/proxmox-lab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
---
# alert-summarizer: LLM アラートサマリ (Claude API)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-alert-summarizer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: default
  source:
    repoURL: https://github.com/fukui-yuto/proxmox-lab
    targetRevision: HEAD
    path: k8s/aiops/alert-summarizer
    directory:
      include: "deployment.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# anomaly-detection: ログ異常検知 CronJob
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-anomaly-detection
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: default
  source:
    repoURL: https://github.com/fukui-yuto/proxmox-lab
    targetRevision: HEAD
    path: k8s/aiops/anomaly-detection
    directory:
      include: "{namespace.yaml,cronjob.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# auto-remediation: 自動修復 RBAC + WorkflowTemplates
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-auto-remediation
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  project: default
  source:
    repoURL: https://github.com/fukui-yuto/proxmox-lab
    targetRevision: HEAD
    path: k8s/aiops/auto-remediation
    directory:
      recurse: true
      exclude: "{kaniko-job.yaml,runner/**}"
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# auto-remediation-events: Argo Events リソース (EventBus/EventSource/Sensor)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-auto-remediation-events
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  source:
    repoURL: https://github.com/fukui-yuto/proxmox-lab
    targetRevision: HEAD
    path: k8s/aiops/auto-remediation/argo-events
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-events
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
