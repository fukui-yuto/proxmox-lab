# Kyverno Helm values
# cleanup jobs は Docker Hub への直接アクセス不可のため Harbor プロキシ経由で bitnami/kubectl を使用
# bitnami/kubectl: 非 root (UID 1001) かつ /bin/bash あり → runAsNonRoot=true 対応
# cgr.dev/chainguard/kubectl は /bin/bash がないため使用不可 (Helm chart が /bin/bash -c をハードコード)
# crds.install=false: Kyverno CRD は大きすぎて ArgoCD の annotations サイズ上限(262144 bytes)を超えるため
#   Helm による CRD 管理を無効化し既存 CRD をそのまま使用する
# ラボ向けに軽量化した設定
# Helm chart: kyverno/kyverno, version: 3.2.6

# -------------------------------------------------------------------
# CRD 管理を無効化 (annotations サイズ超過を回避)
# -------------------------------------------------------------------
crds:
  install: false

# -------------------------------------------------------------------
# Admission Controller (ポリシー評価の中核)
# ラボ環境のためレプリカ数を 1 に設定
# master ノードを避ける (6GB RAM で k3s server と共存すると API 遅延 → リース更新失敗)
# -------------------------------------------------------------------
admissionController:
  replicas: 1
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

# -------------------------------------------------------------------
# Background Controller (既存リソースへのポリシー適用)
# -------------------------------------------------------------------
backgroundController:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Cleanup Controller (TTL ベースのリソース削除)
# -------------------------------------------------------------------
cleanupController:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Reports Controller (ポリシーレポート生成)
# -------------------------------------------------------------------
reportsController:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Features — forceFailurePolicyIgnore を有効化
# kyverno ダウン時に failurePolicy=Fail の webhook が全 Pod 操作をブロックする問題を防止
# -------------------------------------------------------------------
features:
  forceFailurePolicyIgnore:
    enabled: true

# -------------------------------------------------------------------
# Grafana ダッシュボード (monitoring と連携する場合)
# -------------------------------------------------------------------
grafana:
  enabled: false  # monitoring namespace の Grafana と連携する場合は true に変更

# -------------------------------------------------------------------
# policyReports Cleanup Hook Job
# bitnami/kubectl: 非 root (UID 1001) かつ /bin/bash あり → runAsNonRoot=true 対応
# Docker Hub は直接 pull 不可のため Harbor プロキシ経由で取得
# -------------------------------------------------------------------
policyReportsCleanup:
  image:
    registry: harbor.homelab.local
    repository: dockerhub-proxy/bitnami/kubectl
    tag: '1.31'

# -------------------------------------------------------------------
# Cleanup Jobs (Harbor プロキシ経由で bitnami/kubectl を使用)
# bitnami/kubectl: 非 root (UID 1001) かつ /bin/bash あり
# cgr.dev/chainguard/kubectl は /bin/bash がないため使用不可
# -------------------------------------------------------------------
cleanupJobs:
  admissionReports:
    image:
      registry: harbor.homelab.local
      repository: dockerhub-proxy/bitnami/kubectl
      tag: '1.31'
  clusterAdmissionReports:
    image:
      registry: harbor.homelab.local
      repository: dockerhub-proxy/bitnami/kubectl
      tag: '1.31'
  updateRequests:
    image:
      registry: harbor.homelab.local
      repository: dockerhub-proxy/bitnami/kubectl
      tag: '1.31'
  ephemeralReports:
    image:
      registry: harbor.homelab.local
      repository: dockerhub-proxy/bitnami/kubectl
      tag: '1.31'
  clusterEphemeralReports:
    image:
      registry: harbor.homelab.local
      repository: dockerhub-proxy/bitnami/kubectl
      tag: '1.31'
