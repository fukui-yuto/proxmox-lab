# Kyverno Helm values
# cleanup jobs は bitnami/kubectl (Docker Hub) が pull 不可のため cgr.dev/chainguard/kubectl に変更
# registry.k8s.io/kubectl は root 実行のため runAsNonRoot=true に非対応
# crds.install=false: Kyverno CRD は大きすぎて ArgoCD の annotations サイズ上限(262144 bytes)を超えるため
#   Helm による CRD 管理を無効化し既存 CRD をそのまま使用する
# ラボ向けに軽量化した設定
# Helm chart: kyverno/kyverno, version: 3.2.6

# -------------------------------------------------------------------
# CRD 管理を無効化 (annotations サイズ超過を回避)
# -------------------------------------------------------------------
crds:
  install: false

# -------------------------------------------------------------------
# Admission Controller (ポリシー評価の中核)
# ラボ環境のためレプリカ数を 1 に設定
# -------------------------------------------------------------------
admissionController:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -------------------------------------------------------------------
# Background Controller (既存リソースへのポリシー適用)
# -------------------------------------------------------------------
backgroundController:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Cleanup Controller (TTL ベースのリソース削除)
# -------------------------------------------------------------------
cleanupController:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Reports Controller (ポリシーレポート生成)
# -------------------------------------------------------------------
reportsController:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Grafana ダッシュボード (monitoring と連携する場合)
# -------------------------------------------------------------------
grafana:
  enabled: false  # monitoring namespace の Grafana と連携する場合は true に変更

# -------------------------------------------------------------------
# policyReports Cleanup Hook Job (Docker Hub の bitnami/kubectl が pull 不可)
# -------------------------------------------------------------------
policyReportsCleanup:
  image:
    registry: cgr.dev
    repository: chainguard/kubectl
    tag: 'latest'

# -------------------------------------------------------------------
# Cleanup Jobs (Docker Hub の bitnami/kubectl が pull 不可のため上書き)
# cgr.dev/chainguard/kubectl は非 root で動作するため runAsNonRoot=true に対応
# -------------------------------------------------------------------
cleanupJobs:
  admissionReports:
    image:
      registry: cgr.dev
      repository: chainguard/kubectl
      tag: 'latest'
  clusterAdmissionReports:
    image:
      registry: cgr.dev
      repository: chainguard/kubectl
      tag: 'latest'
  updateRequests:
    image:
      registry: cgr.dev
      repository: chainguard/kubectl
      tag: 'latest'
  ephemeralReports:
    image:
      registry: cgr.dev
      repository: chainguard/kubectl
      tag: 'latest'
  clusterEphemeralReports:
    image:
      registry: cgr.dev
      repository: chainguard/kubectl
      tag: 'latest'
