# Kyverno Helm values
# cleanup jobs は bitnami/kubectl (Docker Hub) が pull 不可のため registry.k8s.io に変更
# crds.install=false: Kyverno CRD は大きすぎて ArgoCD の annotations サイズ上限(262144 bytes)を超えるため
#   Helm による CRD 管理を無効化し既存 CRD をそのまま使用する
# ラボ向けに軽量化した設定
# Helm chart: kyverno/kyverno, version: 3.2.6

# -------------------------------------------------------------------
# CRD 管理を無効化 (annotations サイズ超過を回避)
# -------------------------------------------------------------------
crds:
  install: false

# -------------------------------------------------------------------
# Admission Controller (ポリシー評価の中核)
# ラボ環境のためレプリカ数を 1 に設定
# -------------------------------------------------------------------
admissionController:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -------------------------------------------------------------------
# Background Controller (既存リソースへのポリシー適用)
# -------------------------------------------------------------------
backgroundController:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Cleanup Controller (TTL ベースのリソース削除)
# -------------------------------------------------------------------
cleanupController:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Reports Controller (ポリシーレポート生成)
# -------------------------------------------------------------------
reportsController:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------------------
# Grafana ダッシュボード (monitoring と連携する場合)
# -------------------------------------------------------------------
grafana:
  enabled: false  # monitoring namespace の Grafana と連携する場合は true に変更

# -------------------------------------------------------------------
# Cleanup Jobs (Docker Hub の bitnami/kubectl が pull 不可のため上書き)
# -------------------------------------------------------------------
cleanupJobs:
  admissionReports:
    image:
      registry: registry.k8s.io
      repository: kubectl
      tag: 'v1.29.3'
  clusterAdmissionReports:
    image:
      registry: registry.k8s.io
      repository: kubectl
      tag: 'v1.29.3'
  updateRequests:
    image:
      registry: registry.k8s.io
      repository: kubectl
      tag: 'v1.29.3'
  ephemeralReports:
    image:
      registry: registry.k8s.io
      repository: kubectl
      tag: 'v1.29.3'
  clusterEphemeralReports:
    image:
      registry: registry.k8s.io
      repository: kubectl
      tag: 'v1.29.3'
