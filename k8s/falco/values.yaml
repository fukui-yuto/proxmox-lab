## Falco Helm values
## Chart: falcosecurity/falco

# ebpf ドライバーを使用。
# modern_ebpf は KVM VM 環境で perf_event_paranoid=4 の制約により scap_init が失敗するため
# 事前コンパイル済みプローブをダウンロードして使用する ebpf ドライバーを選択する。
driver:
  kind: ebpf

# Falco ルールセット
falco:
  # gRPC は TCP モードで TLS 証明書が必要なため無効化。
  # Falcosidekick は HTTP 経由でアラートを受信するため gRPC 不要。
  grpc:
    enabled: false
  grpc_output:
    enabled: false
  json_output: true
  json_include_output_property: true

# Falcosidekick — アラートの転送 (Alertmanager 連携)
falcosidekick:
  enabled: true
  replicaCount: 1
  config:
    alertmanager:
      hostport: "http://kube-prometheus-stack-alertmanager.monitoring:9093"
      endpoint: "/api/v2/alerts"
      minimumpriority: "warning"
  webui:
    enabled: true
    replicaCount: 1
    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: traefik
      hosts:
        - host: falco.homelab.local
          paths:
            - path: /
              pathType: Prefix
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/master
    operator: Exists

collectors:
  enabled: true
  docker:
    enabled: false
  containerd:
    enabled: true
    socket: /run/containerd/containerd.sock
