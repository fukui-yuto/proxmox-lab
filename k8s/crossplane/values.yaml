## Crossplane Helm values
## Chart: crossplane-stable/crossplane

# Crossplane 本体
replicas: 1

resourcesCrossplane:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

resourcesRBACManager:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Prometheus メトリクス
metrics:
  enabled: true
