# Longhorn Helm values
# ラボ向け分散ブロックストレージ設定
# Helm chart: longhorn/longhorn, version: 1.6.2

# -------------------------------------------------------------------
# デフォルト設定
# -------------------------------------------------------------------
defaultSettings:
  # デフォルトレプリカ数 (1: ラボ環境ではストレージ容量と安定性を優先)
  # 2 にすると storageScheduled が storageMaximum を超え unschedulable → faulted の連鎖が起きる
  defaultReplicaCount: 1

  # ストレージデータパス
  defaultDataPath: /var/lib/longhorn

  # ノードのディスクの最小利用可能割合 (25% 以下になったら新規ボリューム割り当て停止)
  storageMinimalAvailablePercentage: 25

  # ストレージ over-provisioning を制限 (500%→200%)
  # 高すぎると storageScheduled が実容量を大幅に超え、ボリューム障害の連鎖を引き起こす
  storageOverProvisioningPercentage: 200

  # レプリカの自動再構築を有効化
  replicaAutoBalance: best-effort

  # ノードダウン時に StatefulSet/Deployment の Pod を自動削除して別ノードで再起動
  # デフォルト (do-nothing) ではノードダウン後に Pod が Terminating のまま残り
  # ArgoCD が Degraded になる
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod

  # ボリュームが予期せず detach された場合に Pod を自動削除
  # mount busy 等で stuck した Pod を自動復旧させる
  autoDeletePodWhenVolumeDetachedUnexpectedly: true

  # スナップショット自動クリーンアップ
  # 上限に達すると volume が faulted になりデータアクセス不能になるため
  # 自動パージを有効化し、上限を低めに設定して余裕を持たせる
  autoCleanupSystemGeneratedSnapshot: true
  autoCleanupRecurringJobBackupSnapshot: true
  snapshotMaxCount: 100

# -------------------------------------------------------------------
# デフォルト StorageClass 設定
# -------------------------------------------------------------------
persistence:
  # Longhorn をデフォルト StorageClass にする
  defaultClass: true
  defaultClassReplicaCount: 1
  defaultFsType: ext4
  reclaimPolicy: Retain

# -------------------------------------------------------------------
# Longhorn UI Ingress
# -------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: traefik
  host: longhorn.homelab.local
  tls: false

# -------------------------------------------------------------------
# リソース制限 (ラボ向けに軽量化)
# -------------------------------------------------------------------
longhornManager:
  tolerations: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

longhornDriver:
  tolerations: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

longhornUI:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
