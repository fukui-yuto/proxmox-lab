---
# power/ansible/setup-idle-shutdown.yml
# ラボ自動停止のセットアップ
#
# 実行内容:
#   1. pve-node01 の SSH 公開鍵を k3s-master ubuntu ユーザーの authorized_keys に登録
#   2. stop-lab.sh を pve-node01 の /usr/local/lib/lab/ にデプロイ
#   3. systemd timer をセットアップ (5 分ごとにアイドルチェック)
#
# 使い方:
#   cd ansible
#   ansible-playbook -i inventory/hosts.yml ../power/ansible/setup-idle-shutdown.yml

# ------------------------------------------------------------------
# 1. pve-node01 の SSH 公開鍵を k3s-master に登録
#    Raspberry Pi が中継役となり、両ホストへの SSH アクセスを利用する
# ------------------------------------------------------------------
- name: pve-node01 SSH 公開鍵を k3s-master ubuntu ユーザーに登録
  hosts: raspberrypi5
  gather_facts: false
  tasks:
    - name: pve-node01 の RSA 公開鍵を取得
      command: ssh -o BatchMode=yes root@192.168.210.11 cat /root/.ssh/id_rsa.pub
      register: node01_pubkey
      changed_when: false

    - name: k3s-master ubuntu の authorized_keys に公開鍵を追記 (冪等)
      shell: |
        PUBKEY="{{ node01_pubkey.stdout }}"
        ssh -o BatchMode=yes -o StrictHostKeyChecking=no ubuntu@192.168.210.21 \
          "grep -qF '$PUBKEY' ~/.ssh/authorized_keys 2>/dev/null \
           || echo '$PUBKEY' >> ~/.ssh/authorized_keys"
      changed_when: true

# ------------------------------------------------------------------
# 2. stop-lab.sh デプロイ + systemd timer セットアップ (pve-node01)
# ------------------------------------------------------------------
- name: pve-node01 に stop-lab.sh と systemd timer をセットアップ
  hosts: pve-node01
  gather_facts: false
  tasks:
    - name: スクリプト配置ディレクトリ作成
      file:
        path: /usr/local/lib/lab
        state: directory
        mode: "0750"

    - name: stop-lab.sh をデプロイ
      copy:
        src: "{{ playbook_dir }}/../scripts/stop-lab.sh"
        dest: /usr/local/lib/lab/stop-lab.sh
        mode: "0750"

    - name: 状態ファイルディレクトリ作成
      file:
        path: /var/lib/lab-idle-shutdown
        state: directory
        mode: "0700"

    - name: systemd service ファイル配置
      copy:
        dest: /etc/systemd/system/lab-idle-shutdown.service
        content: |
          [Unit]
          Description=Lab Idle Shutdown Check
          After=network.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/lib/lab/stop-lab.sh
          StandardOutput=journal
          StandardError=journal

    - name: systemd timer ファイル配置 (5 分ごと、起動 15 分後から開始)
      copy:
        dest: /etc/systemd/system/lab-idle-shutdown.timer
        content: |
          [Unit]
          Description=Lab Idle Shutdown Check Timer

          [Timer]
          OnBootSec=15min
          OnUnitActiveSec=5min
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: systemd daemon reload
      systemd:
        daemon_reload: true

    - name: lab-idle-shutdown.timer を有効化・起動
      systemd:
        name: lab-idle-shutdown.timer
        enabled: true
        state: started

    - name: timer 状態確認
      command: systemctl status lab-idle-shutdown.timer
      register: timer_status
      changed_when: false

    - name: timer 状態を表示
      debug:
        msg: "{{ timer_status.stdout_lines }}"
