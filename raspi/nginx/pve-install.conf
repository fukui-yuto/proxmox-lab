server {
    listen 80;
    server_name 192.168.210.55;

    # Proxmox ISO コンテンツ配信
    location /iso/ {
        root /srv/pxe;
        autoindex on;
    }

    # Proxmox ISO ファイル本体 (fetch= パラメーター用)
    location /proxmox-ve.iso {
        alias /tmp/proxmox-ve.iso;
    }

    # answer.toml 配信
    location /answer/ {
        root /srv/pxe;
        autoindex on;
        default_type text/plain;
    }

    # インストール完了 webhook 受信 (簡易ログ)
    location /webhook/done {
        access_log /var/log/nginx/pxe-done.log;
        return 200 "OK";
    }
}
