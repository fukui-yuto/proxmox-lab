# /etc/dnsmasq.d/pxe.conf
# PXE ブート用 dnsmasq 設定
# 既存の DHCP サーバー (ルーター) と共存するため proxy モードで動作

# インターフェース指定
interface=eth0
bind-interfaces

# DHCP proxy モード (既存ルーターの DHCP を上書きしない)
dhcp-range=192.168.210.0,proxy

# TFTP サーバー有効化
enable-tftp
tftp-root=/srv/tftp

# PXE ブートファイル (UEFI 用)
pxe-service=x86PC,      "Boot from network (BIOS)",  pxelinux
pxe-service=X86-64_EFI, "Boot from network (UEFI)",  grub/grubx64.efi

# MAC アドレスでホスト名を識別 (プロキシモードのため IP 払い出しはルーター側)
# 静的 IP は Proxmox インストール後に answer.toml の設定で確定する
dhcp-host=f4:4d:30:69:2b:78,pve-node01
dhcp-host=f4:4d:30:6c:67:ef,pve-node02

# ログ
log-dhcp
