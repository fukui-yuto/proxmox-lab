# /etc/dnsmasq.d/pxe.conf
# PXE ブート用 dnsmasq 設定
# 既存の DHCP サーバー (ルーター) と共存するため proxy モードで動作

# DNS 機能を無効化 (systemd-resolved と競合するため)
port=0

# インターフェース指定
interface=eth0

# DHCP proxy モード (既存ルーターの DHCP を上書きしない)
dhcp-range=192.168.210.0,proxy

# TFTP サーバー有効化
enable-tftp
tftp-root=/srv/tftp

# iPXE クライアントを検出 (option 175 を送ってくる)
dhcp-match=set:ipxe,175

# UEFI クライアント (iPXE ではない): ipxe.efi を TFTP で配信
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9
dhcp-boot=tag:efi64,tag:!ipxe,ipxe.efi

# iPXE クライアント: ブートスクリプトを HTTP で配信
dhcp-boot=tag:ipxe,http://192.168.210.55/boot.ipxe

# MAC アドレスでホスト名を識別
dhcp-host=f4:4d:30:69:2b:78,pve-node01
dhcp-host=f4:4d:30:6c:67:ef,pve-node02

# ログ
log-dhcp
