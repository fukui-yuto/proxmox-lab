---
# k3s クラスターに cilium を Helm でインストールする
# 実行前提: flannel が無効化され k3s が再起動済みであること
- name: Install Cilium DaemonSets directly
  hosts: raspberrypi5
  gather_facts: false
  tasks:
    - name: Add cilium helm repo
      command: helm repo add cilium https://helm.cilium.io/
      register: repo_add
      changed_when: "'already exists' not in repo_add.stdout"
      ignore_errors: true

    - name: Update helm repos
      command: helm repo update cilium
      ignore_errors: true

    - name: Template cilium DaemonSets only
      command: >
        helm template cilium cilium/cilium
        --version 1.16.4
        --namespace kube-system
        -f ~/proxmox-lab/k8s/cilium/values.yaml
        --show-only templates/cilium-agent/daemonset.yaml
      register: ds_cilium

    - name: Template cilium-envoy DaemonSet only
      command: >
        helm template cilium cilium/cilium
        --version 1.16.4
        --namespace kube-system
        -f ~/proxmox-lab/k8s/cilium/values.yaml
        --show-only templates/cilium-envoy/daemonset.yaml
      register: ds_envoy

    - name: Apply cilium DaemonSet
      command: kubectl apply --server-side -f -
      args:
        stdin: "{{ ds_cilium.stdout }}"
      register: apply_cilium

    - name: Show apply cilium result
      debug:
        var: apply_cilium.stdout

    - name: Apply cilium-envoy DaemonSet
      command: kubectl apply --server-side -f -
      args:
        stdin: "{{ ds_envoy.stdout }}"
      register: apply_envoy

    - name: Show apply envoy result
      debug:
        var: apply_envoy.stdout

    - name: Wait for cilium pods to start
      command: kubectl wait pods --all -n kube-system -l k8s-app=cilium --for=condition=Ready --timeout=120s
      register: wait_result
      ignore_errors: true

    - name: Show cilium pods
      command: kubectl get pods -n kube-system -l k8s-app=cilium
      register: cilium_pods

    - name: Show pods
      debug:
        var: cilium_pods.stdout

    - name: Show nodes status
      command: kubectl get nodes
      register: nodes

    - name: Show nodes
      debug:
        var: nodes.stdout
