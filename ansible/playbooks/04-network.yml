---
# Linux Bridge 設定 (管理用 vmbr0 + ストレージ用 vmbr0.20)
- name: ネットワーク設定
  hosts: proxmox
  gather_facts: false
  tasks:
    - name: /etc/network/interfaces を設定
      copy:
        dest: /etc/network/interfaces
        content: |
          auto lo
          iface lo inet loopback

          # 物理 NIC
          auto nic0
          iface nic0 inet manual
              post-up ethtool -s nic0 wol g

          # 管理用ブリッジ (192.168.210.0/24)
          auto vmbr0
          iface vmbr0 inet static
              address {{ ansible_host }}/24
              gateway 192.168.210.254
              bridge-ports nic0
              bridge-stp off
              bridge-fd 0

          # ストレージ / レプリケーション用 (VLAN20 / 192.168.212.0/24)
          auto vmbr0.20
          iface vmbr0.20 inet static
              address {{ storage_ip }}/24
              vlan-raw-device vmbr0
      vars:
        storage_ip: "{{ '192.168.212.11' if inventory_hostname == 'pve-node01' else '192.168.212.12' if inventory_hostname == 'pve-node02' else '192.168.212.13' }}"
      notify: restart networking

    - name: Wake-on-LAN を即時有効化 (ethtool)
      command: ethtool -s nic0 wol g

  handlers:
    - name: restart networking
      command: ifreload -a
