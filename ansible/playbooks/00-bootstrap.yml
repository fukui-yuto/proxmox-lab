---
# 初回のみ実行: RaspberryPi の SSH 公開鍵を各ノードに登録する
# 実行方法: ansible-playbook playbooks/00-bootstrap.yml -k
#   (-k オプションでパスワード入力プロンプトが表示される)
# 事前に sshpass が必要: apt install sshpass

- name: SSH 公開鍵を各ノードに配布 (初回セットアップ)
  hosts: proxmox
  vars:
    ansible_ssh_private_key_file: ""
  tasks:
    - name: RaspberryPi の公開鍵を authorized_keys に追加
      authorized_key:
        user: root
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
