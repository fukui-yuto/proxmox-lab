---
# worker03 クロスノードルート設定
#
# 背景: worker03 (192.168.211.24, pve-node02) と master/worker01/02 (pve-node01) は
#       同一サブネット (192.168.211.0/24) だが VLAN10 ブリッジが L2 未接続のため、
#       ARP による直接解決ができない。
#       /32 の特定ルートを追加し、node02 のゲートウェイ (192.168.211.2) 経由にする。
#
# 使い方:
#   ansible-playbook -i inventory/hosts.yml playbooks/09-k3s-worker03-routes.yml

- name: worker03 クロスノードルート設定
  hosts: localhost
  tasks:
    - name: worker03 の netplan に /32 ルートを追加
      command: >
        ssh -o StrictHostKeyChecking=no ubuntu@192.168.211.24
        "sudo tee /etc/netplan/99-cross-node-routes.yaml > /dev/null << 'EOF'
        network:
          version: 2
          ethernets:
            eth0:
              routes:
                - to: 192.168.211.21/32
                  via: 192.168.211.2
                - to: 192.168.211.22/32
                  via: 192.168.211.2
                - to: 192.168.211.23/32
                  via: 192.168.211.2
        EOF"
      register: netplan_write

    - name: netplan apply
      command: >
        ssh -o StrictHostKeyChecking=no ubuntu@192.168.211.24
        "sudo netplan apply"
      register: netplan_apply

    - name: ルート確認
      command: >
        ssh -o StrictHostKeyChecking=no ubuntu@192.168.211.24
        "ip route show | grep '192.168.211.2[123]'"
      register: route_check
      changed_when: false

    - name: ルート確認結果を表示
      debug:
        var: route_check.stdout_lines

    - name: master への疎通確認
      command: >
        ssh -o StrictHostKeyChecking=no ubuntu@192.168.211.24
        "ping -c 3 192.168.211.21"
      register: ping_check
      changed_when: false

    - name: 疎通確認結果を表示
      debug:
        var: ping_check.stdout_lines
