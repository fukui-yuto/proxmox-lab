---
# Proxmox クラスター構築 + QDevice 設定
- name: クラスター作成 (node01 のみ)
  hosts: pve-node01
  tasks:
    - name: クラスターが存在しない場合のみ作成
      command: pvecm create {{ pve_cluster_name }}
      args:
        creates: /etc/corosync/corosync.conf

- name: node02 の SSH 公開鍵を node01 に登録
  hosts: pve-node01
  tasks:
    - name: node02 の公開鍵を取得
      slurp:
        src: /root/.ssh/id_rsa.pub
      register: node02_pubkey
      delegate_to: pve-node02

    - name: node02 の公開鍵を node01 の authorized_keys に追加
      authorized_key:
        user: root
        key: "{{ node02_pubkey.content | b64decode }}"

- name: node02 をクラスターに参加
  hosts: pve-node02
  tasks:
    - name: クラスター参加済みか確認
      command: pvecm status
      register: cluster_status
      failed_when: false
      changed_when: false

    - name: node01 の host key を known_hosts に登録
      known_hosts:
        name: "192.168.210.11"
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 192.168.210.11') }}"
        state: present

    - name: クラスターに参加 (未参加の場合)
      command: pvecm add 192.168.210.11 --use_ssh
      when: "'homelab' not in cluster_status.stdout"

- name: QDevice ホスト (RaspberryPi) の準備
  hosts: pve-node01
  tasks:
    - name: node01 の SSH 公開鍵を取得
      slurp:
        src: /root/.ssh/id_rsa.pub
      register: node01_pubkey

    - name: RaspberryPi の root authorized_keys に node01 の公開鍵を追加
      authorized_key:
        user: root
        key: "{{ node01_pubkey.content | b64decode }}"
      delegate_to: localhost

    - name: RaspberryPi の root SSH ログインを有効化
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin prohibit-password"
      delegate_to: localhost

    - name: SSH サービスを再起動
      service:
        name: ssh
        state: restarted
      delegate_to: localhost

- name: QDevice セットアップ (node01 から実行)
  hosts: pve-node01
  tasks:
    - name: QDevice を追加
      command: pvecm qdevice setup {{ pve_qdevice_ip }}
      args:
        creates: /etc/corosync/qdevice
