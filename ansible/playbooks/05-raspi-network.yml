---
# Raspberry Pi のネットワーク設定
# VLAN10 (192.168.211.0/24) への静的ルートを Netplan で永続化する
# ルーティング: 192.168.211.0/24 → pve-node01 (192.168.210.11) 経由
- name: Raspberry Pi ネットワーク設定
  hosts: raspi
  tasks:
    - name: Netplan 設定ファイルを配置
      copy:
        dest: /etc/netplan/50-homelab.yaml
        content: |
          network:
            version: 2
            ethernets:
              eth0:
                dhcp4: false
                addresses:
                  - 192.168.210.55/24
                routes:
                  - to: default
                    via: 192.168.210.254
                  - to: 192.168.211.0/24
                    via: 192.168.210.11
                  - to: 192.168.211.24/32   # worker03 は node02 経由
                    via: 192.168.210.12
                nameservers:
                  addresses:
                    - 192.168.210.254
        mode: "0600"
      notify: apply netplan

    - name: 既存の cloud-init Netplan 設定を無効化
      copy:
        dest: /etc/netplan/50-cloud-init.yaml
        content: |
          # This file is intentionally left empty.
          # Network is managed by 50-homelab.yaml
          network:
            version: 2
        mode: "0600"
      notify: apply netplan

  handlers:
    - name: apply netplan
      command: netplan apply
