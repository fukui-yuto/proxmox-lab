---
# Raspberry Pi のネットワーク設定
# 静的 IP と デフォルトゲートウェイを Netplan で永続化する
- name: Raspberry Pi ネットワーク設定
  hosts: raspi
  tasks:
    - name: wakeonlan インストール
      apt:
        name: wakeonlan
        state: present

    - name: Netplan 設定ファイルを配置
      copy:
        dest: /etc/netplan/50-homelab.yaml
        content: |
          network:
            version: 2
            ethernets:
              eth0:
                dhcp4: false
                addresses:
                  - 192.168.210.55/24
                routes:
                  - to: default
                    via: 192.168.210.254
                nameservers:
                  addresses:
                    - 192.168.210.254
        mode: "0600"
      notify: apply netplan

    - name: 既存の cloud-init Netplan 設定を無効化
      copy:
        dest: /etc/netplan/50-cloud-init.yaml
        content: |
          # This file is intentionally left empty.
          # Network is managed by 50-homelab.yaml
          network:
            version: 2
        mode: "0600"
      notify: apply netplan

    - name: homelab.local ドメインを /etc/hosts に登録
      blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED BLOCK homelab"
        block: |
          192.168.210.25 argocd.homelab.local
          192.168.210.25 harbor.homelab.local
          192.168.210.25 grafana.homelab.local
          192.168.210.25 kibana.homelab.local
          192.168.210.25 keycloak.homelab.local
          192.168.210.25 vault.homelab.local
          192.168.210.25 argo-workflows.homelab.local
          192.168.210.25 alert-summarizer.homelab.local
          192.168.210.25 minio.homelab.local
          192.168.210.25 minio-api.homelab.local
          192.168.210.25 longhorn.homelab.local
          192.168.210.25 elasticsearch.homelab.local

  handlers:
    - name: apply netplan
      command: netplan apply
