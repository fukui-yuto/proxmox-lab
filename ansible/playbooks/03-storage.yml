---
# ZFS プール作成 + Proxmox ストレージ登録
- name: ZFS ストレージ設定
  hosts: proxmox
  tasks:
    - name: ZFS プールが存在しない場合のみ作成
      command: zpool create -f data {{ zfs_data_disk }}
      args:
        creates: /data
      when: zfs_data_disk != ""

    - name: ZFS ストレージを Proxmox に登録
      command: >
        pvesm add zfspool data-{{ inventory_hostname }}
        --pool data
        --content images,rootdir
      failed_when: false
      when: zfs_data_disk != ""

- name: Proxmox Replication 設定 (node01 から)
  hosts: pve-node01
  tasks:
    - name: Replication ジョブのスケジュール設定はインストール後に Web UI で行う
      debug:
        msg: "Proxmox Replication は VM 作成後、Web UI → VM → Replication から設定してください"
